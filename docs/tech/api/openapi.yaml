            format: date
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ScheduleExceptionListResponse"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
    post:
      tags: [Admin]
      summary: Добавить исключение расписания
      operationId: adminCreateScheduleException
      security:
        - BearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ScheduleExceptionCreate"
      responses:
        "201":
          description: Создано
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ScheduleException"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "422":
          $ref: "#/components/responses/ValidationError"

  /api/v1/admin/schedule/exceptions/{exception_id}:
    parameters:
      - $ref: "#/components/parameters/ScheduleExceptionId"
    get:
      tags: [Admin]
      summary: Получить исключение расписания
      operationId: adminGetScheduleException
      security:
        - BearerAuth: []
      responses:
