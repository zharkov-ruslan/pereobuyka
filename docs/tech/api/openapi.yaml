openapi: 3.0.3
info:
  title: Pereobuyka API
  description: |
    HTTP API ядра «Переобуйка». Сценарии — docs/vision.md §4.
    LLM не подменяет факты; контекст подмешивается на сервере (vision §6).
  version: 1.0.0
servers:
  - url: /
tags:
  - name: Auth
    description: Идентификация и получение токена (upsert пользователя)
  - name: Public
    description: Публичные эндпоинты без авторизации
  - name: Client
    description: Эндпоинты клиента (Bearer)
  - name: Consultation
    description: LLM-консультация (Bearer)
  - name: Admin
    description: Управление системой (Bearer, role=admin)

paths:
  /api/v1/auth/telegram:
    post:
      tags: [Auth]
      summary: Вход / регистрация через Telegram (upsert User)
      operationId: authTelegram
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/TelegramAuthRequest"
      responses:
        "200":
          description: OK — существующий пользователь вошёл
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/TokenResponse"
        "201":
          description: Created — новый пользователь зарегистрирован
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/TokenResponse"
        "422":
          $ref: "#/components/responses/ValidationError"

  /api/v1/auth/web:
    post:
      tags: [Auth]
      summary: Вход клиента в веб по telegram_username (MVP)
      operationId: authWeb
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/WebAuthRequest"
      responses:
        "200":
          description: OK — пользователь найден
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/TokenResponse"
        "201":
          description: Created — создан новый клиент
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/TokenResponse"
        "422":
          $ref: "#/components/responses/ValidationError"

  /api/v1/me:
    get:
      tags: [Client]
      summary: Текущий пользователь
      operationId: getMe
      security:
        - BearerAuth: []
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/User"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "404":
          $ref: "#/components/responses/NotFound"

  /api/v1/services:
    get:
      tags: [Public]
      summary: Каталог услуг
      operationId: listServices
      parameters:
        - name: active_only
          in: query
          schema:
            type: boolean
            default: true
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ServiceListResponse"

  /api/v1/slots:
    get:
      tags: [Public]
      summary: Свободные окна
      operationId: listSlots
      parameters:
        - name: date_from
          in: query
          required: true
          schema:
            type: string
            format: date
        - name: date_to
          in: query
          required: true
          schema:
            type: string
            format: date
        - name: service_ids
          in: query
          required: true
          schema:
            type: array
            items:
              type: string
              format: uuid
          style: form
          explode: true
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SlotListResponse"
        "422":
          $ref: "#/components/responses/ValidationError"

  /api/v1/appointments:
    post:
      tags: [Client]
      summary: Создать запись
      description: |
        `starts_at` должен быть **в будущем** относительно момента запроса на сервере (UTC).
        Иначе — **422** с `error.code` = `STARTS_AT_IN_PAST` (то же правило для `POST /api/v1/admin/appointments`).
      operationId: createAppointment
      security:
        - BearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/AppointmentCreateRequest"
      responses:
        "201":
          description: Создано
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Appointment"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "409":
          $ref: "#/components/responses/DomainError"
        "422":
          description: |
            Валидация тела (Pydantic) или слот в прошлом — `STARTS_AT_IN_PAST`.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
              examples:
                startsAtInPast:
                  summary: Слот в прошлом
                  value:
                    error:
                      code: STARTS_AT_IN_PAST
                      message: Нельзя создать запись на прошедшее время

  /api/v1/me/appointments:
    get:
      tags: [Client]
      summary: Мои записи
      operationId: listMyAppointments
      security:
        - BearerAuth: []
      parameters:
        - name: date_from
          in: query
          schema:
            type: string
            format: date
        - name: date_to
          in: query
          schema:
            type: string
            format: date
        - name: status
          in: query
          schema:
            $ref: "#/components/schemas/AppointmentStatus"
        - name: limit
          in: query
          schema:
            type: integer
            minimum: 1
            maximum: 100
            default: 20
        - name: offset
          in: query
          schema:
            type: integer
            minimum: 0
            default: 0
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AppointmentListResponse"
        "401":
          $ref: "#/components/responses/Unauthorized"

  /api/v1/me/appointments/{appointment_id}:
    parameters:
      - $ref: "#/components/parameters/AppointmentId"
    patch:
      tags: [Client]
      summary: Обновить запись (в т.ч. отменить)
      operationId: patchMyAppointment
      security:
        - BearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/AppointmentPatchRequest"
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Appointment"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "404":
          $ref: "#/components/responses/NotFound"
        "409":
          $ref: "#/components/responses/DomainError"
        "422":
          $ref: "#/components/responses/ValidationError"

  /api/v1/me/visits:
    get:
      tags: [Client]
      summary: История визитов
      operationId: listMyVisits
      security:
        - BearerAuth: []
      parameters:
        - name: date_from
          in: query
          schema:
            type: string
            format: date
        - name: date_to
          in: query
          schema:
            type: string
            format: date
        - name: limit
          in: query
          schema:
            type: integer
            minimum: 1
            maximum: 100
            default: 20
        - name: offset
          in: query
          schema:
            type: integer
            minimum: 0
            default: 0
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/VisitListResponse"
        "401":
          $ref: "#/components/responses/Unauthorized"

  /api/v1/me/visits/{visit_id}/service-rating:
    post:
      tags: [Client]
      summary: Оценка сервиса после визита
      operationId: postServiceRating
      security:
        - BearerAuth: []
      parameters:
        - name: visit_id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ServiceRatingBody"
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Visit"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "404":
          $ref: "#/components/responses/NotFound"
        "422":
          $ref: "#/components/responses/ValidationError"

  /api/v1/me/bonus-account:
    get:
      tags: [Client]
      summary: Бонусный счёт
      operationId: getMyBonusAccount
      security:
        - BearerAuth: []
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/BonusAccount"
        "401":
          $ref: "#/components/responses/Unauthorized"

  /api/v1/me/bonus-transactions:
    get:
      tags: [Client]
      summary: История бонусных операций
      operationId: listMyBonusTransactions
      security:
        - BearerAuth: []
      parameters:
        - name: limit
          in: query
          schema:
            type: integer
            minimum: 1
            maximum: 100
            default: 20
        - name: offset
          in: query
          schema:
            type: integer
            minimum: 0
            default: 0
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/BonusTransactionListResponse"
        "401":
          $ref: "#/components/responses/Unauthorized"

  /api/v1/loyalty/rules:
    get:
      tags: [Public]
      summary: Правила программы лояльности
      operationId: getLoyaltyRules
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/LoyaltyRules"

  /api/v1/consultation/messages:
    get:
      tags: [Consultation]
      summary: История сообщений консультации
      operationId: listConsultationMessages
      security:
        - BearerAuth: []
      parameters:
        - name: limit
          in: query
          schema:
            type: integer
            minimum: 1
            maximum: 100
            default: 50
        - name: offset
          in: query
          schema:
            type: integer
            minimum: 0
            default: 0
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ConsultationMessageListResponse"
        "401":
          $ref: "#/components/responses/Unauthorized"
    post:
      tags: [Consultation]
      summary: Отправить сообщение в LLM
      operationId: postConsultationMessage
      security:
        - BearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ConsultationRequest"
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ConsultationResponse"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "503":
          $ref: "#/components/responses/ServiceUnavailable"

  /api/v1/consultation/transcribe:
    post:
      tags: [Consultation]
      summary: Распознать голосовой файл в текст (STT для Telegram)
      operationId: postConsultationTranscribe
      security:
        - BearerAuth: []
      requestBody:
        required: true
        content:
          multipart/form-data:
            schema:
              type: object
              required: [file]
              properties:
                file:
                  type: string
                  format: binary
                  description: Аудиофайл (например OGG/Opus из Telegram)
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ConsultationTranscribeResponse"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "422":
          $ref: "#/components/responses/ValidationError"
        "503":
          $ref: "#/components/responses/ServiceUnavailable"

  /api/v1/admin/dashboard/today:
    get:
      tags: [Admin]
      summary: KPI дашборда на сегодня
      operationId: adminDashboardToday
      security:
        - BearerAuth: []
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DashboardTodayResponse"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"

  /api/v1/admin/dashboard/week-grid:
    get:
      tags: [Admin]
      summary: Сетка недели для записей и визитов
      operationId: adminWeekGrid
      security:
        - BearerAuth: []
      parameters:
        - name: week_start
          in: query
          required: true
          schema:
            type: string
            format: date
          description: Понедельник недели
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/WeekGridResponse"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"

  /api/v1/admin/analytics/week:
    get:
      tags: [Admin]
      summary: Аналитика недели для графиков
      operationId: adminAnalyticsWeek
      security:
        - BearerAuth: []
      parameters:
        - name: week_start
          in: query
          required: true
          schema:
            type: string
            format: date
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AnalyticsWeekResponse"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"

  /api/v1/admin/analytics/data-insight:
    post:
      tags: [Admin]
      summary: Вопрос к операционным данным (NL→SQL, только SELECT)
      description: >
        Генерация безопасного SELECT через LLM, валидация AST и whitelist таблиц (ADR-006).
        Требуется OPENROUTER_API_KEY на сервере.
      operationId: adminAnalyticsDataInsight
      security:
        - BearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/AdminDataInsightRequest"
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AdminDataInsightResponse"
        "400":
          description: Запрос отклонён валидатором или ошибка выполнения SQL
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "503":
          description: LLM недоступен или неверный ответ модели
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /api/v1/admin/clients:
    get:
      tags: [Admin]
      summary: Список клиентов (KPI)
      operationId: adminListClients
      security:
        - BearerAuth: []
      parameters:
        - name: limit
          in: query
          schema:
            type: integer
            minimum: 1
            maximum: 100
            default: 20
        - name: offset
          in: query
          schema:
            type: integer
            minimum: 0
            default: 0
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AdminClientListResponse"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"

  /api/v1/admin/clients/{user_id}:
    get:
      tags: [Admin]
      summary: Карточка клиента
      operationId: adminGetClient
      security:
        - BearerAuth: []
      parameters:
        - name: user_id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AdminClientRow"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          $ref: "#/components/responses/NotFound"

  /api/v1/admin/users/{user_id}/appointments:
    get:
      tags: [Admin]
      summary: Записи выбранного пользователя
      operationId: adminUserAppointments
      security:
        - BearerAuth: []
      parameters:
        - name: user_id
          in: path
          required: true
          schema:
            type: string
            format: uuid
        - name: status
          in: query
          schema:
            $ref: "#/components/schemas/AppointmentStatus"
        - name: limit
          in: query
          schema:
            type: integer
            minimum: 1
            maximum: 100
            default: 20
        - name: offset
          in: query
          schema:
            type: integer
            minimum: 0
            default: 0
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AdminAppointmentListResponse"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"

  /api/v1/admin/users/{user_id}/visits:
    get:
      tags: [Admin]
      summary: Визиты выбранного пользователя
      operationId: adminUserVisits
      security:
        - BearerAuth: []
      parameters:
        - name: user_id
          in: path
          required: true
          schema:
            type: string
            format: uuid
        - name: limit
          in: query
          schema:
            type: integer
            minimum: 1
            maximum: 100
            default: 20
        - name: offset
          in: query
          schema:
            type: integer
            minimum: 0
            default: 0
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/VisitListResponse"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          $ref: "#/components/responses/NotFound"

  /api/v1/admin/appointments/{appointment_id}:
    patch:
      tags: [Admin]
      summary: Правка записи администратором
      operationId: adminPatchAppointment
      security:
        - BearerAuth: []
      parameters:
        - name: appointment_id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/AdminAppointmentPatchBody"
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Appointment"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          $ref: "#/components/responses/NotFound"
        "409":
          $ref: "#/components/responses/DomainError"
        "422":
          $ref: "#/components/responses/ValidationError"

  /api/v1/admin/visits/{visit_id}:
    patch:
      tags: [Admin]
      summary: Правка визита администратором
      operationId: adminPatchVisit
      security:
        - BearerAuth: []
      parameters:
        - name: visit_id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/AdminVisitPatchBody"
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Visit"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          $ref: "#/components/responses/NotFound"
        "422":
          $ref: "#/components/responses/ValidationError"

  /api/v1/admin/visits/{visit_id}/client-rating:
    post:
      tags: [Admin]
      summary: Оценка клиента администратором
      operationId: adminPostClientRating
      security:
        - BearerAuth: []
      parameters:
        - name: visit_id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/VisitRatingBody"
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Visit"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          $ref: "#/components/responses/NotFound"
        "422":
          $ref: "#/components/responses/ValidationError"

  /api/v1/admin/services:
    get:
      tags: [Admin]
      summary: Список услуг (включая неактивные)
      operationId: adminListServices
      security:
        - BearerAuth: []
      parameters:
        - name: is_active
          in: query
          schema:
            type: boolean
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ServiceListResponse"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
    post:
      tags: [Admin]
      summary: Создать услугу
      operationId: adminCreateService
      security:
        - BearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ServiceCreate"
      responses:
        "201":
          description: Создано
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Service"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "422":
          $ref: "#/components/responses/ValidationError"

  /api/v1/admin/services/{service_id}:
    parameters:
      - $ref: "#/components/parameters/ServiceId"
    get:
      tags: [Admin]
      summary: Получить услугу
      operationId: adminGetService
      security:
        - BearerAuth: []
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Service"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          $ref: "#/components/responses/NotFound"
    patch:
      tags: [Admin]
      summary: Обновить услугу
      operationId: adminPatchService
      security:
        - BearerAuth: []
      requestBody:
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ServicePatch"
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Service"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          $ref: "#/components/responses/NotFound"
        "422":
          $ref: "#/components/responses/ValidationError"
    delete:
      tags: [Admin]
      summary: Удалить услугу
      operationId: adminDeleteService
      security:
        - BearerAuth: []
      responses:
        "204":
