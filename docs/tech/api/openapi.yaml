    patch:
      tags: [Admin]
      summary: Изменить исключение расписания
      operationId: adminPatchScheduleException
      security:
        - BearerAuth: []
      requestBody:
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ScheduleExceptionPatch"
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ScheduleException"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          $ref: "#/components/responses/NotFound"
        "422":
          $ref: "#/components/responses/ValidationError"
    delete:
      tags: [Admin]
      summary: Удалить исключение расписания
      operationId: adminDeleteScheduleException
      security:
        - BearerAuth: []
      responses:
