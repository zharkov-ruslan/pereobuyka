        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          $ref: "#/components/responses/NotFound"

  /api/v1/admin/appointments:
    get:
      tags: [Admin]
      summary: Журнал записей и загрузка
      operationId: adminListAppointments
      security:
        - BearerAuth: []
      parameters:
        - name: date_from
          in: query
          schema:
            type: string
            format: date
        - name: date_to
          in: query
          schema:
            type: string
            format: date
        - name: status
          in: query
          schema:
            $ref: "#/components/schemas/AppointmentStatus"
        - name: user_id
          in: query
          schema:
            type: string
            format: uuid
        - name: limit
          in: query
          schema:
            type: integer
            minimum: 1
            maximum: 100
            default: 20
        - name: offset
          in: query
          schema:
            type: integer
            minimum: 0
            default: 0
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AdminAppointmentListResponse"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"

    post:
      tags: [Admin]
      summary: Создать запись на клиента
      description: |
        Источник записи на стороне сервера — `admin`. Требование к `starts_at`: не в прошлом
        (см. `STARTS_AT_IN_PAST` в `POST /api/v1/appointments`).
      operationId: adminCreateAppointment
      security:
        - BearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/AdminAppointmentCreateBody"
      responses:
        "201":
          description: Создано
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Appointment"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          $ref: "#/components/responses/NotFound"
        "422":
          description: Валидация или STARTS_AT_IN_PAST
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /api/v1/admin/visits:
    post:
      tags: [Admin]
      summary: Подтвердить визит (факт услуг и начисление бонусов)
      operationId: adminConfirmVisit
      security:
        - BearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/VisitConfirmRequest"
      responses:
        "201":
          description: Создано
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Visit"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "409":
          $ref: "#/components/responses/DomainError"
        "422":
          $ref: "#/components/responses/ValidationError"

  /api/v1/admin/users/{user_id}/bonus-account:
    get:
      tags: [Admin]
      summary: Бонусный счёт клиента
      operationId: adminGetUserBonusAccount
      security:
        - BearerAuth: []
      parameters:
        - $ref: "#/components/parameters/UserId"
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/BonusAccount"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          $ref: "#/components/responses/NotFound"

  /api/v1/admin/users/{user_id}/bonus-transactions:
    post:
      tags: [Admin]
      summary: Ручная корректировка бонусов
      operationId: adminCreateBonusAdjustment
      security:
        - BearerAuth: []
      parameters:
        - $ref: "#/components/parameters/UserId"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/BonusAdjustRequest"
      responses:
        "201":
          description: Создано
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/BonusTransaction"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          $ref: "#/components/responses/NotFound"
        "409":
          $ref: "#/components/responses/DomainError"
        "422":
          $ref: "#/components/responses/ValidationError"

components:
  securitySchemes:
    BearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT

  parameters:
    AppointmentId:
      name: appointment_id
      in: path
      required: true
      schema:
        type: string
        format: uuid
    ServiceId:
      name: service_id
      in: path
      required: true
      schema:
        type: string
        format: uuid
    ScheduleRuleId:
      name: rule_id
      in: path
      required: true
      schema:
        type: string
        format: uuid
    ScheduleExceptionId:
      name: exception_id
      in: path
      required: true
      schema:
        type: string
        format: uuid
    UserId:
      name: user_id
      in: path
      required: true
      schema:
        type: string
        format: uuid

  responses:
    Unauthorized:
      description: Нет или невалидный токен
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorResponse"
    Forbidden:
      description: Недостаточно прав
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorResponse"
    NotFound:
      description: Ресурс не найден
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorResponse"
    ValidationError:
      description: Ошибка валидации тела или параметров
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorResponse"
    DomainError:
      description: Доменная ошибка (конфликт, нарушение бизнес-правила)
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorResponse"
    ServiceUnavailable:
      description: Внешний сервис недоступен (например, LLM-провайдер)
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorResponse"

  schemas:

    # ── Core / shared ──────────────────────────────────────────────────────────

    ErrorResponse:
      type: object
      required: [error]
      properties:
        error:
          type: object
          required: [code, message]
          properties:
            code:
              type: string
            message:
              type: string
            details:
              type: object
              additionalProperties: true

    UserRole:
      type: string
      enum: [client, admin]

    UserSource:
      type: string
      enum: [telegram, web]

    User:
      type: object
      required: [id, name, role, registered_at, source]
      properties:
        id:
          type: string
          format: uuid
        name:
          type: string
        phone:
          type: string
          nullable: true
        role:
          $ref: "#/components/schemas/UserRole"
        telegram_id:
          type: integer
          format: int64
          nullable: true
        telegram_username:
          type: string
          nullable: true
        registered_at:
          type: string
          format: date-time
        source:
          $ref: "#/components/schemas/UserSource"

    TelegramAuthRequest:
      type: object
      required: [telegram_id, name]
      properties:
        telegram_id:
          type: integer
          format: int64
        name:
          type: string
        phone:
          type: string

    WebAuthRequest:
      type: object
      required: [telegram_username]
      properties:
        telegram_username:
          type: string
          minLength: 1
          maxLength: 64
        name:
          type: string
          nullable: true
        phone:
          type: string
          nullable: true

    TokenResponse:
      type: object
      required: [access_token, token_type, user]
      properties:
        access_token:
          type: string
        token_type:
          type: string
          enum: [bearer]
        user:
          $ref: "#/components/schemas/User"

    # ── Services ───────────────────────────────────────────────────────────────

    Service:
      type: object
      required: [id, name, description, price, duration_minutes, is_active]
      properties:
        id:
          type: string
          format: uuid
        name:
          type: string
        description:
          type: string
        price:
          type: string
          description: "Цена услуги в рублях, десятичная строка"
          example: "2500.00"
        duration_minutes:
          type: integer
          description: Норма времени на выполнение (минуты)
        is_active:
          type: boolean

    ServiceCreate:
      type: object
      required: [name, description, price, duration_minutes, is_active]
      properties:
        name:
          type: string
        description:
          type: string
        price:
          type: string
          description: "Цена услуги в рублях, десятичная строка"
          example: "2500.00"
        duration_minutes:
          type: integer
        is_active:
          type: boolean

    ServicePatch:
      type: object
      properties:
        name:
          type: string
        description:
          type: string
        price:
          type: string
          description: "Цена услуги в рублях, десятичная строка"
          example: "2500.00"
        duration_minutes:
          type: integer
        is_active:
          type: boolean

    ServiceListResponse:
      type: object
      required: [items]
      properties:
        items:
          type: array
          items:
            $ref: "#/components/schemas/Service"

    # ── Schedule ───────────────────────────────────────────────────────────────

    ScheduleRule:
      type: object
      required: [id, weekday, start_time, end_time, is_day_off]
      properties:
        id:
          type: string
          format: uuid
        weekday:
          type: integer
          minimum: 0
          maximum: 6
          description: "День недели: 0 — понедельник, 6 — воскресенье"
        start_time:
          type: string
          format: time
          example: "09:00:00"
        end_time:
          type: string
          format: time
          example: "18:00:00"
        is_day_off:
          type: boolean

    ScheduleRuleCreate:
      type: object
      required: [weekday, start_time, end_time, is_day_off]
      properties:
        weekday:
          type: integer
          minimum: 0
          maximum: 6
          description: "День недели: 0 — понедельник, 6 — воскресенье"
        start_time:
          type: string
          format: time
          example: "09:00:00"
        end_time:
          type: string
          format: time
          example: "18:00:00"
        is_day_off:
          type: boolean

    ScheduleRulePatch:
      type: object
      properties:
        weekday:
          type: integer
          minimum: 0
          maximum: 6
        start_time:
          type: string
          format: time
          example: "09:00:00"
        end_time:
          type: string
          format: time
          example: "18:00:00"
        is_day_off:
          type: boolean

    ScheduleRuleListResponse:
      type: object
      required: [items]
      properties:
        items:
          type: array
          items:
            $ref: "#/components/schemas/ScheduleRule"

    ScheduleException:
      type: object
      required: [id, date, start_time, end_time, is_day_off]
      properties:
        id:
          type: string
          format: uuid
        date:
          type: string
          format: date
        start_time:
          type: string
          format: time
          example: "09:00:00"
        end_time:
          type: string
          format: time
          example: "18:00:00"
        is_day_off:
          type: boolean

    ScheduleExceptionCreate:
      type: object
      required: [date, start_time, end_time, is_day_off]
      properties:
        date:
          type: string
          format: date
        start_time:
          type: string
          format: time
          example: "09:00:00"
        end_time:
          type: string
          format: time
          example: "18:00:00"
        is_day_off:
          type: boolean

    ScheduleExceptionPatch:
      type: object
      properties:
        date:
          type: string
          format: date
        start_time:
          type: string
          format: time
          example: "09:00:00"
        end_time:
          type: string
          format: time
          example: "18:00:00"
        is_day_off:
          type: boolean

    ScheduleExceptionListResponse:
      type: object
      required: [items]
      properties:
        items:
          type: array
          items:
            $ref: "#/components/schemas/ScheduleException"

    # ── Appointments ──────────────────────────────────────────────────────────

    AppointmentStatus:
      type: string
      enum: [scheduled, completed, cancelled]

    AppointmentSource:
      type: string
      enum: [llm, telegram_bot, web, admin]

    ServiceLineItem:
      type: object
      description: Позиция услуги в записи или визите
      required: [service_id, quantity]
      properties:
        service_id:
          type: string
          format: uuid
        quantity:
          type: integer
          minimum: 1
          default: 1

    AppointmentCreateRequest:
      type: object
      required: [starts_at, service_items]
      properties:
        starts_at:
          type: string
          format: date-time
          description: Начало записи; должно быть строго позже текущего времени сервера (UTC), иначе 422 STARTS_AT_IN_PAST.
        service_items:
          type: array
          items:
            $ref: "#/components/schemas/ServiceLineItem"
        bonus_spend:
          type: integer
          minimum: 0
          description: "Количество бонусов для списания. Ограничено max_bonus_spend_percent из LoyaltyRules."

    AppointmentPatchRequest:
      type: object
      properties:
        status:
          type: string
          enum: [cancelled]
          description: Клиент может перевести запись только в статус cancelled

    Appointment:
      type: object
      required:
        - id
        - user_id
        - starts_at
        - ends_at
        - total_price
        - status
        - created_at
        - service_items
        - source
        - discount_percent
      properties:
        id:
          type: string
          format: uuid
        user_id:
          type: string
          format: uuid
        starts_at:
          type: string
          format: date-time
        ends_at:
          type: string
          format: date-time
        total_price:
          type: string
          description: "Расчётная стоимость на момент записи, десятичная строка"
          example: "4300.00"
        status:
          $ref: "#/components/schemas/AppointmentStatus"
        created_at:
          type: string
          format: date-time
        service_items:
          type: array
          items:
            $ref: "#/components/schemas/ServiceLineItem"
        source:
          $ref: "#/components/schemas/AppointmentSource"
        discount_percent:
          type: integer
          minimum: 0
          maximum: 100

    AppointmentListResponse:
      type: object
      required: [items, total]
      properties:
        items:
          type: array
          items:
            $ref: "#/components/schemas/Appointment"
        total:
          type: integer
          description: Общее число записей без учёта пагинации

    AppointmentAdmin:
      allOf:
        - $ref: "#/components/schemas/Appointment"
        - type: object
          properties:
            user:
              $ref: "#/components/schemas/User"

    AdminAppointmentListResponse:
      type: object
      required: [items, total]
      properties:
        items:
          type: array
          items:
            $ref: "#/components/schemas/AppointmentAdmin"
        total:
          type: integer
          description: Общее число записей без учёта пагинации

    SlotWindow:
      type: object
      required: [starts_at, ends_at]
      properties:
        starts_at:
          type: string
          format: date-time
        ends_at:
          type: string
          format: date-time

    SlotListResponse:
      type: object
      required: [items]
      properties:
        items:
          type: array
          items:
            $ref: "#/components/schemas/SlotWindow"

    # ── Visits ────────────────────────────────────────────────────────────────

    Visit:
      type: object
      required:
        - id
        - appointment_id
        - total_amount
        - bonus_spent
        - bonus_earned
        - confirmed_at
        - confirmed_by_user_id
        - lines
      properties:
        id:
          type: string
          format: uuid
        appointment_id:
          type: string
          format: uuid
        total_amount:
          type: string
          description: "Итоговая сумма оплаты, десятичная строка"
          example: "4300.00"
        bonus_spent:
          type: integer
        bonus_earned:
          type: integer
          description: Начислено бонусов по итогам визита (рассчитывает сервер)
        confirmed_at:
          type: string
          format: date-time
        confirmed_by_user_id:
          type: string
          format: uuid
        lines:
          type: array
          items:
            $ref: "#/components/schemas/ServiceLineItem"
        client_rating_stars:
          type: integer
          nullable: true
          minimum: 1
          maximum: 5
        client_rating_comment:
          type: string
          nullable: true
        service_rating_stars:
          type: integer
          nullable: true
          minimum: 1
          maximum: 5
        service_rating_comment:
          type: string
          nullable: true

    VisitListResponse:
      type: object
      required: [items, total]
      properties:
        items:
          type: array
          items:
            $ref: "#/components/schemas/Visit"
        total:
          type: integer
          description: Общее число визитов без учёта пагинации

    VisitConfirmRequest:
      type: object
      required: [appointment_id, lines, total_amount]
      properties:
        appointment_id:
          type: string
          format: uuid
        lines:
          type: array
          items:
            $ref: "#/components/schemas/ServiceLineItem"
        total_amount:
          type: string
          description: "Итоговая сумма оплаты, десятичная строка"
          example: "4300.00"
        bonus_spent:
          type: integer
          minimum: 0
          description: "Количество бонусов, списанных при оплате. Если не передано — считается 0."

    # ── Bonus ─────────────────────────────────────────────────────────────────

    BonusAccount:
      type: object
      required: [id, user_id, balance]
      properties:
        id:
          type: string
          format: uuid
        user_id:
          type: string
          format: uuid
        balance:
          type: integer

    BonusTransactionType:
      type: string
      enum: [earn, spend, adjust]

    BonusTransaction:
      type: object
      required: [id, type, amount, created_at]
      properties:
        id:
          type: string
          format: uuid
        type:
          $ref: "#/components/schemas/BonusTransactionType"
        amount:
          type: integer
          description: "Положительное — начисление, отрицательное — списание"
        visit_id:
          type: string
          format: uuid
          nullable: true
        created_at:
          type: string
          format: date-time
        comment:
          type: string
          nullable: true

    BonusTransactionListResponse:
      type: object
      required: [items, total]
      properties:
        items:
          type: array
          items:
            $ref: "#/components/schemas/BonusTransaction"
        total:
          type: integer

    BonusAdjustRequest:
      type: object
      required: [amount, comment]
      properties:
        amount:
          type: integer
          description: "Положительное — начисление, отрицательное — списание. Итоговый баланс не может быть отрицательным."
        comment:
          type: string

    # ── Loyalty ───────────────────────────────────────────────────────────────

    LoyaltyRules:
      type: object
      required: [max_bonus_spend_percent, earn_percent_after_visit]
      properties:
        max_bonus_spend_percent:
          type: integer
          minimum: 0
          maximum: 100
          description: Максимальная доля стоимости визита, оплачиваемая бонусами (%)
        earn_percent_after_visit:
          type: integer
          minimum: 0
          maximum: 100
          description: Процент от суммы визита, начисляемый бонусами (%)

    # ── Consultation ──────────────────────────────────────────────────────────

    ConsultationRequest:
      type: object
      required: [message]
      properties:
        message:
          type: string
          maxLength: 4000
        history:
          type: array
          maxItems: 20
          items:
            $ref: "#/components/schemas/ConsultationHistoryItem"
          description: Предыдущие реплики user/assistant (для связного диалога в /ask)

    ConsultationHistoryItem:
      type: object
      required: [role, content]
      properties:
        role:
          type: string
          enum: [user, assistant]
        content:
          type: string
          maxLength: 4000

    ConsultationResponse:
      type: object
      required: [reply]
      properties:
        reply:
          type: string
        request_id:
          type: string
          format: uuid
          description: Идентификатор запроса для поддержки и диагностики

    ConsultationTranscribeResponse:
      type: object
      required: [text]
      properties:
        text:
          type: string
          description: Распознанный текст (для последующей отправки в POST /consultation/messages)

    ConsultationMessageOut:
      type: object
      required: [id, role, content, created_at]
      properties:
        id:
          type: string
          format: uuid
        role:
          type: string
          enum: [user, assistant]
        content:
          type: string
        created_at:
          type: string
          format: date-time
        request_id:
          type: string
          format: uuid
          nullable: true

    ConsultationMessageListResponse:
      type: object
      required: [items, total]
      properties:
        items:
          type: array
          items:
            $ref: "#/components/schemas/ConsultationMessageOut"
        total:
          type: integer

    DashboardTodayResponse:
      type: object
      required:
        - date
        - appointments_total
        - visits_total
        - cancellations_total
        - bookings_scheduled_today_by_source
        - consultation_user_messages_last_7_days
      description: |
        «Сегодня» — календарная дата в `consultation_business_timezone`.
        Записи на день считаются по **пересечению** интервала [starts_at, ends_at) с локальным
        полуинтервалом [00:00; 24:00) этого дня (как отображение в сетке недели), а не только
        по вхождению `starts_at` в день.
      properties:
        date:
          type: string
          format: date
          description: Локальная дата «сегодня» в TZ бизнеса
        appointments_total:
          type: integer
          description: Все записи, пересекающие этот день (любой статус)
        visits_total:
          type: integer
          description: Визиты с confirmed_at, попадающим в этот локальный день
        cancellations_total:
          type: integer
          description: Записи в статусе cancelled, пересекающие этот день
        bookings_scheduled_today_by_source:
          type: object
          description: |
            Число записей по полю source среди scheduled, completed и cancelled за день
            (то же правило пересечения с днём). Ключи ответа — `admin`, `web`, `llm`, `telegram_bot`;
            неизвестный source на сервере может агрегироваться в `web`.
          additionalProperties:
            type: integer
        consultation_user_messages_last_7_days:
          type: integer
          description: Сообщения пользователя в консультациях за последние 7 суток (UTC)

    WeekGridEvent:
      type: object
      required:
        - state
        - appointment_id
        - total_price
        - client_name
        - service_summaries
      properties:
        state:
          type: string
          enum: [scheduled, completed, cancelled]
        appointment_id:
          type: string
          format: uuid
        visit_id:
          type: string
          format: uuid
          nullable: true
        total_price:
          type: string
        client_name:
          type: string
        service_summaries:
          type: array
          items:
            type: string
        client_rating_stars:
          type: integer
          nullable: true
          minimum: 1
          maximum: 5
          description: Оценка клиента после визита; только для state=completed при наличии визита
        client_rating_comment:
          type: string
          nullable: true

    WeekGridSlot:
      type: object
      required: [starts_at, ends_at, events]
      properties:
        starts_at:
          type: string
          format: date-time
          description: Начало слота (UTC, ISO с Z)
        ends_at:
          type: string
          format: date-time
        events:
          type: array
          items:
            $ref: "#/components/schemas/WeekGridEvent"

    WeekGridDay:
      type: object
      required: [date, slots]
      properties:
        date:
          type: string
          format: date
        slots:
          type: array
          items:
            $ref: "#/components/schemas/WeekGridSlot"

    WeekGridResponse:
      type: object
      required: [week_start, slot_step_minutes, days]
      properties:
        week_start:
          type: string
          format: date
        slot_step_minutes:
          type: integer
        days:
          type: array
          items:
            $ref: "#/components/schemas/WeekGridDay"

    AnalyticsWeekResponse:
      type: object
      required: [week_start, top_services, days]
      properties:
        week_start:
          type: string
          format: date
        top_services:
          type: array
          items:
            type: object
            additionalProperties: true
        days:
          type: array
          items:
            type: object
            additionalProperties: true

    AdminDataInsightRequest:
      type: object
      required: [question]
      properties:
        question:
          type: string
          minLength: 1
          maxLength: 2000

    AdminDataInsightResponse:
      type: object
      required: [summary, sql_executed, columns, rows, truncated]
      properties:
        summary:
          type: string
        sql_executed:
          type: string
        columns:
          type: array
          items:
            type: string
        rows:
          type: array
          items:
            type: object
            additionalProperties: true
        truncated:
          type: boolean

    AdminClientRow:
      type: object
      required:
        - user_id
        - name
        - visits_count
        - total_spent
        - bonus_balance
      properties:
        user_id:
          type: string
          format: uuid
        name:
          type: string
        phone:
          type: string
          nullable: true
        telegram_id:
          type: integer
          format: int64
          nullable: true
        telegram_username:
          type: string
          nullable: true
        visits_count:
          type: integer
        total_spent:
          type: string
        bonus_balance:
          type: integer
        rating_avg:
          type: string
          nullable: true

    AdminClientListResponse:
      type: object
      required: [items, total]
      properties:
        items:
          type: array
          items:
            $ref: "#/components/schemas/AdminClientRow"
        total:
          type: integer

    AdminAppointmentCreateBody:
      type: object
      required: [user_id, starts_at, service_items]
      properties:
        user_id:
          type: string
          format: uuid
          description: Клиент (роль client)
        starts_at:
          type: string
          format: date-time
          description: Начало записи; не в прошлом (UTC), иначе STARTS_AT_IN_PAST
        service_items:
          type: array
          minItems: 1
          items:
            $ref: "#/components/schemas/ServiceLineItem"
        discount_percent:
          type: integer
          minimum: 0
          maximum: 100
          default: 0

    AdminAppointmentPatchBody:
      type: object
      properties:
        status:
          $ref: "#/components/schemas/AppointmentStatus"
        service_items:
          type: array
          items:
            $ref: "#/components/schemas/ServiceLineItem"
        discount_percent:
          type: integer
          minimum: 0
          maximum: 100
        source:
          $ref: "#/components/schemas/AppointmentSource"

    AdminVisitPatchBody:
      type: object
      properties:
        lines:
          type: array
          items:
            $ref: "#/components/schemas/ServiceLineItem"
        total_amount:
          type: string
          nullable: true
        bonus_spent:
          type: integer
          minimum: 0
          nullable: true
        bonus_earned:
          type: integer
          minimum: 0
          nullable: true

    VisitRatingBody:
      type: object
      required: [stars]
      properties:
        stars:
          type: integer
          minimum: 1
          maximum: 5
        comment:
          type: string
          nullable: true

    ServiceRatingBody:
      type: object
      required: [stars]
      properties:
        stars:
          type: integer
          minimum: 1
          maximum: 5
        comment:
          type: string
          nullable: true
